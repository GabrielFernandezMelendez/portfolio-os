<div
  class="os-window"
  [style.left.px]="win().x"
  [style.top.px]="win().y"
  [style.width.px]="win().width"
  [style.height.px]="win().height"
  [style.zIndex]="win().zIndex"
  (mousedown)="focus()">

  <!-- Resize handles -->
  <div class="resize-handle n"  (mousedown)="startResize($event, 'n')"></div>
  <div class="resize-handle s"  (mousedown)="startResize($event, 's')"></div>
  <div class="resize-handle e"  (mousedown)="startResize($event, 'e')"></div>
  <div class="resize-handle w"  (mousedown)="startResize($event, 'w')"></div>
  <div class="resize-handle ne" (mousedown)="startResize($event, 'ne')"></div>
  <div class="resize-handle nw" (mousedown)="startResize($event, 'nw')"></div>
  <div class="resize-handle se" (mousedown)="startResize($event, 'se')"></div>
  <div class="resize-handle sw" (mousedown)="startResize($event, 'sw')"></div>

  <!-- Barra de título estilo Win2k -->
  <div class="titlebar" (mousedown)="startDrag($event)">
    <span class="titlebar-icon">{{ win().icon }}</span>
    <span class="titlebar-title">{{ win().title }}</span>

    <div class="titlebar-controls">
      <button
        class="win-btn btn-minimize"
        title="Minimizar"
        (mousedown)="$event.stopPropagation()"
        (click)="minimize()">
        _
      </button>
      <button
        class="win-btn btn-maximize"
        title="Maximizar"
        (mousedown)="$event.stopPropagation()"
        (click)="maximize()">
        □
      </button>
      <button
        class="win-btn btn-close"
        title="Cerrar"
        (mousedown)="$event.stopPropagation()"
        (click)="close()">
        ✕
      </button>
    </div>
  </div>

  <!-- Contenido -->
  <div class="window-body">
    <ng-content />
  </div>

</div>
