<div class="mobile-shell" [class.light]="!isDark()">

  <app-mobile-background [isDark]="isDark()" [paused]="golPaused()" />

  <app-mobile-status-bar [isDark]="isDark()" (onSwipeDown)="openNotifications()">
  </app-mobile-status-bar>

  <div class="mobile-viewport">

    @if (mobileView() === 'notifications') {
      <app-notification-panel [isDark]="isDark()" [golPaused]="golPaused()"
        (onClose)="closeNotifications()"
        (onToggleTheme)="toggleTheme()"
        (onToggleGol)="toggleGol()">
      </app-notification-panel>
    }

    @if (mobileView() === 'home') {
      <app-mobile-home [apps]="apps" [isDark]="isDark()" (onOpenApp)="openApp($event)">
      </app-mobile-home>
    }

    @if (mobileView() === 'app' && activeApp()) {
      <app-mobile-app-view [appId]="activeApp()!" [isDark]="isDark()">
      </app-mobile-app-view>
    }

    @if (mobileView() === 'recents') {
      <app-mobile-recents [openedApps]="openedApps()" [isDark]="isDark()"
        (onResume)="resumeApp($event)"
        (onClose)="closeApp($event)"
        (onCloseAll)="openedApps.set([]); mobileView.set('home')">
      </app-mobile-recents>
    }

  </div>

  <app-mobile-navbar [isDark]="isDark()" [activeView]="mobileView()"
    (onBack)="goBack()"
    (onHome)="goHome()"
    (onRecents)="goRecents()">
  </app-mobile-navbar>

</div>
