<div
  class="app-view"
  [class.visible]="visible()"
  [class.closing]="closing()"
  [class.light]="!isDark()"
>
  <div class="app-content">
    @switch (appId()) {
      @case ('about') {
        <app-about-mobile [isDark]="isDark()" />
      }
      @case ('experience') {
        <app-experience-mobile [isDark]="isDark()" />
      }
      @case ('skills') {
        <app-skills-mobile [isDark]="isDark()" />
      }
      @case ('education') {
        <app-education-mobile [isDark]="isDark()" />
      }
      @case ('projects') {
        <app-projects-mobile [isDark]="isDark()" />
      }
      @case ('contact') {
        <app-contact-mobile [isDark]="isDark()" />
      }
      @case ('github') {
        <app-github-mobile [isDark]="isDark()" />
      }
    }
  </div>
</div>
