<div
  class="app-view"
  [class.visible]="visible()"
  [class.closing]="closing()"
  [class.light]="!isDark()">

  <div class="app-content">
    @switch (appId()) {
      @case ('about') { <app-about-mobile [isDark]="isDark()" /> }
      @case ('experience') { <app-experience-mobile [isDark]="isDark()" /> }
      @case ('skills') { <app-skills-mobile [isDark]="isDark()" /> }
      @case ('education')  { <app-education /> }
      @case ('projects')   { <app-projects /> }
      @case ('contact')    { <app-contact [isLight]="!isDark()" /> }
      @case ('github')     { <app-github /> }
    }
  </div>

</div>
